name: CI/CD — Build and Deploy to Azure Web App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: your-app-name           # <<-- set your App Service name
  AZURE_WEBAPP_PACKAGE_PATH: '.'             # <<-- path to app (root by default)
  NODE_VERSION: '20.x'
  ARTIFACT_NAME: node-app
  ZIP_NAME: node-app.zip

permissions:
  contents: read

jobs:
  validate-secrets:
    runs-on: ubuntu-latest
    outputs:
      publish_profile_present: ${{ steps.check.outputs.present }}
    steps:
      - name: Check required secrets
        id: check
        run: |
          missing=""
          if [ -z "${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}" ] && [ -z "${{ secrets.AZURE_CREDENTIALS }}" ]; then
            missing="AZURE_WEBAPP_PUBLISH_PROFILE or AZURE_CREDENTIALS"
          fi
          if [ -n "$missing" ]; then
            echo "Required secret missing: $missing"
            exit 1
          fi
          echo "present=true" > result.txt
          cat result.txt
        continue-on-error: false

  build:
    needs: validate-secrets
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [ ${{ env.NODE_VERSION }} ]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (if present)
        run: npm run build --if-present

      - name: Zip artifact
        run: |
          rm -f ${{ env.ZIP_NAME }}
          zip -r ${{ env.ZIP_NAME }} ${{ env.AZURE_WEBAPP_PACKAGE_PATH }} -x ".git/*" "node_modules/*" "*.zip" || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ZIP_NAME }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: 'Development'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: .

      - name: Unzip artifact
        run: |
          unzip -o ${{ env.ZIP_NAME }} -d deploy_package

      - name: Deploy to Azure WebApp (publish profile)
        id: deploy-to-webapp
        if: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE != '' }}
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./deploy_package

      - name: Deploy to Azure WebApp (service principal)
        id: deploy-sp
        if: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE == '' && secrets.AZURE_CREDENTIALS != '' }}
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_CREDENTIALS }}
          package: ./deploy_package

      - name: Wait for app (simple)
        run: |
          for i in {1..10}; do
            status=$(curl -s -o /dev/null -w "%{http_code}" https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/ || true)
            if [ "$status" = "200" ]; then
              echo "App responded 200"
              exit 0
            fi
            echo "Waiting for app... attempt $i (status=$status)"
            sleep 6
          done
          echo "App did not respond with 200 after wait period"
          exit 1
