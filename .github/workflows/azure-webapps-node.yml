name: CI/CD — Build and Deploy to Azure Web App

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME || 'your-app-name' }}
  AZURE_WEBAPP_PACKAGE_PATH: '.'
  NODE_VERSION: '20.x'
  ARTIFACT_NAME: node-app
  ZIP_NAME: node-app.zip

permissions:
  contents: read

jobs:
  validate-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}" ] && [ -z "${{ secrets.AZURE_CREDENTIALS }}" ]; then
            echo "❌ ERROR: Missing required secrets"
            echo "Please configure one of:"
            echo "  - AZURE_WEBAPP_PUBLISH_PROFILE (recommended for Web Apps)"
            echo "  - AZURE_CREDENTIALS (service principal)"
            exit 1
          fi
          echo "✅ Required secrets validated"

  build:
    needs: validate-secrets
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [${{ env.NODE_VERSION }}]
    steps:
      - uses: actions/checkout@v4

      - name: Validate Node.js package lock
        run: |
          if [ ! -f "package-lock.json" ] && [ ! -f "yarn.lock" ]; then
            echo "⚠️ Warning: No package lock file found"
          fi

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting (if configured)
        run: npm run lint --if-present
        continue-on-error: true

      - name: Build application
        run: npm run build --if-present

      - name: Create deployment package
        run: |
          rm -f ${{ env.ZIP_NAME }}
          zip -r ${{ env.ZIP_NAME }} \
            ${{ env.AZURE_WEBAPP_PACKAGE_PATH }} \
            -x ".git/*" ".gitignore" "node_modules/*" "*.zip" ".env*" \
            "**/.DS_Store" "**/.vscode/*" "**/dist/*"
          
          if [ ! -f "${{ env.ZIP_NAME }}" ]; then
            echo "❌ ERROR: Failed to create deployment package"
            exit 1
          fi
          
          size=$(du -h "${{ env.ZIP_NAME }}" | cut -f1)
          echo "✅ Deployment package created: $size"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ZIP_NAME }}
          retention-days: 5

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: 'Production'
      url: ${{ steps.deploy.outputs.webapp-url }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: .

      - name: Verify artifact
        run: |
          if [ ! -f "${{ env.ZIP_NAME }}" ]; then
            echo "❌ ERROR: Artifact not found"
            exit 1
          fi
          echo "✅ Artifact verified: $(du -h ${{ env.ZIP_NAME }})"

      - name: Extract deployment package
        run: |
          mkdir -p deploy_package
          unzip -q -o "${{ env.ZIP_NAME }}" -d deploy_package
          
          if [ ! -d "deploy_package" ] || [ -z "$(ls -A deploy_package)" ]; then
            echo "❌ ERROR: Failed to extract deployment package"
            exit 1
          fi
          echo "✅ Package extracted successfully"

      - name: Determine deployment method
        id: auth-method
        run: |
          if [ -n "${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}" ]; then
            echo "method=publish-profile" >> $GITHUB_OUTPUT
            echo "ℹ️  Using publish profile authentication"
          else
            echo "method=credentials" >> $GITHUB_OUTPUT
            echo "ℹ️  Using service principal authentication"
          fi

      - name: Deploy to Azure Web App
        id: deploy
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE || secrets.AZURE_CREDENTIALS }}
          package: ./deploy_package

      - name: Health check — Wait for app to respond
        id: health-check
        run: |
          app_url="https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/"
          max_attempts=30
          attempt=1
          
          echo "🔍 Starting health check for $app_url"
          
          while [ $attempt -le $max_attempts ]; do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$app_url" 2>/dev/null || echo "000")
            
            if [ "$status" = "200" ]; then
              echo "✅ App responded with 200 OK (attempt $attempt/$max_attempts)"
              echo "url=$app_url" >> $GITHUB_OUTPUT
              exit 0
            fi
            
            if [ $((attempt % 5)) -eq 0 ]; then
              echo "ℹ️  Attempt $attempt/$max_attempts (status=$status)"
            fi
            
            attempt=$((attempt + 1))
            sleep 10
          done
          
          echo "⚠️  WARNING: App did not respond with 200 after $((max_attempts * 10)) seconds"
          echo "ℹ️  App may still be starting. Check Azure portal for details."
          echo "url=$app_url" >> $GITHUB_OUTPUT
          exit 0  # Don't fail the workflow for health check timeouts

      - name: Deployment summary
        if: always()
        run: |
          echo "📋 Deployment Summary"
          echo "===================="
          echo "App Name: ${{ env.AZURE_WEBAPP_NAME }}"
          echo "Auth Method: ${{ steps.auth-method.outputs.method }}"
          echo "Status: ${{ job.status }}"
          echo "Deployment Package: ${{ env.ZIP_NAME }}"
          echo ""
          echo "✅ Deployment completed. Monitor app performance in Azure Portal."

      - name: Upload deployment logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-logs
          path: |
            .
          retention-days: 7
